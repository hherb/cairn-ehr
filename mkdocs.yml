site_name: Cairn
site_description: >-
  Cairn — an offline-first, vendor-independent electronic health record.
  The grid goes down. The chart stays up.
site_url: https://docs.cairn-ehr.org
copyright: >-
  Cairn is free software under the AGPL-3.0. The name is stewarded for the mission —
  see Stewardship of the Name.

docs_dir: docs

# Local preview address. 8000/8080 are almost always taken (proxies, MLX servers, etc.),
# so use a high, quiet port. Affects `mkdocs serve` only — not the built site.
dev_addr: 127.0.0.1:8765

# Disposable working scaffolding and AI tooling are not part of the published site.
exclude_docs: |
  HANDOVER.md
  superpowers/
  requirements.txt

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  # Self-host type instead of fetching from Google Fonts — same fonts as the
  # landing page, and consistent with the project's no-third-party-CDN stance.
  font: false
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

plugins:
  - search
  # Renders GitHub/Obsidian-style "> [!NOTE]" callouts as Material admonitions,
  # so the same source renders on GitHub *and* in this site.
  - callouts
  # The canonical home is spec/index.md (served at /spec/). Redirect the bare
  # site root (/) there so docs.cairn-ehr.org doesn't 404.
  - redirects:
      redirect_maps:
        index.md: spec/index.md

extra_css:
  - stylesheets/extra.css

nav:
  - "↤ cairn-ehr.org": https://cairn-ehr.org
  - Home: spec/index.md
  - Architecture:
      - Vision & goals: spec/vision.md
      - Topology: spec/topology.md
      - Data model: spec/data-model.md
      - Demographics: spec/demographics.md
      - Identity subsystem: spec/identity.md
      - Synchronisation: spec/sync.md
      - Security & compliance: spec/security.md
      - Deployment profiles: spec/deployment.md
      - Language & substrate: spec/language-substrate.md
      - Technology candidates: spec/technology.md
      - Open questions: spec/open-questions.md
  - Decisions (ADRs):
      - spec/decisions/README.md
      - ADR-0000 · Pre-ADR changelog: spec/decisions/0000-pre-adr-changelog-v0.1-v0.6.md
      - ADR-0001 · Fat Postgres, thin daemon: spec/decisions/0001-fat-postgres-thin-daemon.md
      - ADR-0002 · In-database Rust (pgrx) escape hatch: spec/decisions/0002-in-database-rust-pgrx-escape-hatch.md
      - ADR-0003 · Bitemporal time & acknowledged uncertainty: spec/decisions/0003-bitemporal-time-and-acknowledged-uncertainty.md
      - ADR-0004 · Dynamic sync scope — prefetch, not authority: spec/decisions/0004-dynamic-sync-scope-prefetch-not-authority.md
      - ADR-0005 · Erasure — key-custody & crypto-shredding: spec/decisions/0005-erasure-key-custody-and-crypto-shredding.md
      - ADR-0006 · Visibility-scope — replication & the safety projection: spec/decisions/0006-visibility-scope-replication-and-the-safety-projection.md
      - ADR-0007 · Authorship is compositional, accountability separable: spec/decisions/0007-authorship-and-accountability.md
  - Principles:
      - Stewardship of the name: principles/STEWARDSHIP-OF-THE-NAME.md
